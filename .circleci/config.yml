version: 2.1

orbs:
  architect: giantswarm/architect@6.14.1

workflows:
  build-tools:
    jobs:
    - architect/push-to-registries:
        context: architect
        name: push-to-registries-changelogger
        dockerfile: ./tools/changelogger/Dockerfile
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/push-to-registries:
        context: architect
        name: push-to-registries-values-sync
        dockerfile: ./tools/values-sync/Dockerfile
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master

    - architect/push-to-registries:
        context: architect
        name: push-to-registries-schema-gen
        dockerfile: ./tools/schema-gen/Dockerfile
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master
